name: Temporary Sync Lobby Types

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'agent/platform-finalization-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/platform-finalization-v1
          fetch-depth: 0

      - name: Synchronize generated types and lobby query
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          types = Path('src/integrations/supabase/types.ts')
          text = types.read_text()
          lobbies_start = text.index('      lobbies: {')
          lobbies_end = text.index('      preset_rules: {', lobbies_start)
          block = text[lobbies_start:lobbies_end]

          if '          rule_set_hash: string | null\n' not in block:
              block = block.replace(
                  '          opponent_name: string | null\n          status: string | null\n',
                  '          opponent_name: string | null\n          rule_set_hash: string | null\n          status: string | null\n',
                  1,
              )
          if '          rule_set_hash?: string | null\n' not in block:
              block = block.replace(
                  '          opponent_name?: string | null\n          status?: string | null\n',
                  '          opponent_name?: string | null\n          rule_set_hash?: string | null\n          status?: string | null\n',
                  1,
              )
              update_pos = block.index('        Update: {')
              before, after = block[:update_pos], block[update_pos:]
              after = after.replace(
                  '          opponent_name?: string | null\n          status?: string | null\n',
                  '          opponent_name?: string | null\n          rule_set_hash?: string | null\n          status?: string | null\n',
                  1,
              )
              block = before + after
          text = text[:lobbies_start] + block + text[lobbies_end:]

          text = text.replace(
              '    Functions: {\n      [_ in never]: never\n    }',
              '    Functions: {\n      cancel_rule_lobby_v2: {\n        Args: { p_lobby_id: string }\n        Returns: boolean\n      }\n    }',
              1,
          )
          types.write_text(text)

          lobby = Path('src/pages/Lobby.tsx')
          lobby_text = lobby.read_text()
          lobby_text = lobby_text.replace(
              'updated_at, rule_set_hash, rule_set_hash, rule_set_hash',
              'updated_at, rule_set_hash',
          )
          lobby.write_text(lobby_text)
          PY

      - name: Commit type synchronization
        env:
          HUSKY: "0"
        run: |
          set -euo pipefail
          if git diff --quiet; then exit 0; fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/integrations/supabase/types.ts src/pages/Lobby.tsx
          git commit --no-verify -m 'fix: synchronize lobby schema and cancellation RPC types'
          git push origin HEAD:agent/platform-finalization-v1
