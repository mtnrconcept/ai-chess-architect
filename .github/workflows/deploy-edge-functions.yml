name: Deploy Rule Architect V2 Edge Functions

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: GitHub Environment protégé à cibler
        required: true
        type: choice
        options:
          - staging
          - production
      release_sha:
        description: SHA complet du commit sélectionné pour ce run
        required: true
        type: string
      project_ref_confirmation:
        description: Référence Supabase exacte attendue
        required: true
        type: string
      database_migration_confirmed:
        description: La migration de ce même commit a été appliquée et validée
        required: true
        default: false
        type: boolean
      retention_cron_confirmed:
        description: Le cron de rétention a été créé et testé sur cette cible
        required: true
        default: false
        type: boolean

concurrency:
  group: rule-architect-edge-${{ inputs.target_environment }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy four V2 functions
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: ${{ inputs.target_environment }}
    env:
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_CLI_VERSION: 2.109.1
      IMPORT_MAP: supabase/functions/import_map.json

    steps:
      - name: Refuse an unconfirmed target
        shell: bash
        env:
          CONFIRMED_PROJECT_REF: ${{ inputs.project_ref_confirmation }}
          CONFIRMED_RELEASE_SHA: ${{ inputs.release_sha }}
          MIGRATION_CONFIRMED: ${{ inputs.database_migration_confirmed }}
          RETENTION_CRON_CONFIRMED: ${{ inputs.retention_cron_confirmed }}
        run: |
          set -euo pipefail
          if [[ -z "$SUPABASE_PROJECT_ID" ]]; then
            echo "Environment secret SUPABASE_PROJECT_ID is required." >&2
            exit 1
          fi
          if [[ "$MIGRATION_CONFIRMED" != "true" ]]; then
            echo "Database migration confirmation is required before Edge deployment." >&2
            exit 1
          fi
          if [[ "$RETENTION_CRON_CONFIRMED" != "true" ]]; then
            echo "A tested retention cron is required before Edge deployment." >&2
            exit 1
          fi
          if [[ "$CONFIRMED_PROJECT_REF" != "$SUPABASE_PROJECT_ID" ]]; then
            echo "The typed project reference does not match the protected environment secret." >&2
            exit 1
          fi
          if [[ "$CONFIRMED_RELEASE_SHA" != "$GITHUB_SHA" ]]; then
            echo "release_sha must equal the selected workflow commit ($GITHUB_SHA)." >&2
            exit 1
          fi
          if [[ "${{ inputs.target_environment }}" == "production" && "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "Production deployments are only allowed from main." >&2
            exit 1
          fi

      - name: Checkout exact commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Validate import map
        shell: bash
        run: |
          set -euo pipefail
          test -f "$IMPORT_MAP"
          jq empty "$IMPORT_MAP"
          if grep -nE 'https:/[^/]' "$IMPORT_MAP"; then
            echo "Malformed URL found in import map." >&2
            exit 1
          fi

      - name: Prime pinned Supabase CLI without deployment credentials
        run: npx --yes "supabase@${SUPABASE_CLI_VERSION}" --version

      - name: Deploy explicit Rule Architect allowlist
        shell: bash
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "$SUPABASE_ACCESS_TOKEN" ]]; then
            echo "Environment secret SUPABASE_ACCESS_TOKEN is required." >&2
            exit 1
          fi
          functions=(
            compile-chess-rule
            publish-rule-version
            create-rule-lobby-v2
            join-rule-lobby-v2
          )

          for function_name in "${functions[@]}"; do
            test -f "supabase/functions/${function_name}/index.ts"
            echo "::group::Deploying ${function_name}"
            npx --offline --yes "supabase@${SUPABASE_CLI_VERSION}" functions deploy "$function_name" \
              --project-ref "$SUPABASE_PROJECT_ID" \
              --import-map "$IMPORT_MAP"
            echo "::endgroup::"
          done

      - name: Deployment summary
        run: |
          {
            echo "### Rule Architect V2 Edge deployment"
            echo "- Environment: \`${{ inputs.target_environment }}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Supabase CLI: \`${SUPABASE_CLI_VERSION}\`"
            echo "- Functions: four explicit V2 functions"
            echo "- Retention cron: confirmed"
          } >> "$GITHUB_STEP_SUMMARY"
