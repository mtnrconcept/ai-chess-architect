name: Rule Architect V2

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        shell: bash
        run: |
          set -o pipefail
          pnpm audit --prod --audit-level moderate 2>&1 | tee pnpm-audit.log

      - name: Upload audit diagnostics on failure
        if: failure() && hashFiles('pnpm-audit.log') != ''
        uses: actions/upload-artifact@v4
        with:
          name: production-audit-diagnostics
          path: pnpm-audit.log
          if-no-files-found: ignore
          retention-days: 3

      - name: Verify mirrored compiler and runtime invariants
        run: node scripts/verify-rule-architect-v2.mjs

      - name: Verify deployment and security invariants
        run: node scripts/verify-rule-architect-v2-ops.mjs

      - name: Test confirmed Supabase target guard
        run: node --test scripts/utils/supabase-target.test.mjs

      - name: Unit tests
        run: >-
          pnpm exec vitest run
          src/rules-v2
          src/engine/__tests__
          src/features/rule-architect
          src/features/play-hub
          src/features/multiplayer
          src/pages/Leaderboard.test.tsx
          src/pages/MultiplayerMatch.test.tsx
          src/integrations/supabase/client.test.ts
          configs/deployment/supabaseBuildFallback.test.ts

      - name: Type check
        shell: bash
        run: |
          set -o pipefail
          {
            pnpm exec tsc --noEmit -p tsconfig.app.json
            pnpm exec tsc --noEmit -p tsconfig.node.json
          } 2>&1 | tee typecheck.log

      - name: Upload TypeScript diagnostics on failure
        if: failure() && hashFiles('typecheck.log') != ''
        uses: actions/upload-artifact@v4
        with:
          name: typescript-diagnostics
          path: typecheck.log
          if-no-files-found: ignore
          retention-days: 3

      - name: Production build without remote writes
        run: pnpm build

  edge-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install npm dependencies for Deno npm imports
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Install pinned Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.9.3
          cache: true

      - name: Type-check six Edge entrypoints
        shell: bash
        run: |
          set -o pipefail
          deno check --node-modules-dir=manual \
            supabase/functions/compile-chess-rule/index.ts \
            supabase/functions/generate-rule-questions/index.ts \
            supabase/functions/publish-rule-version/index.ts \
            supabase/functions/create-rule-lobby-v2/index.ts \
            supabase/functions/join-rule-lobby-v2/index.ts \
            supabase/functions/process-chess-move/index.ts \
            2>&1 | tee deno-check.log

      - name: Upload Deno diagnostics on failure
        if: failure() && hashFiles('deno-check.log') != ''
        uses: actions/upload-artifact@v4
        with:
          name: deno-check-diagnostics
          path: deno-check.log
          if-no-files-found: ignore
          retention-days: 3

      - name: Test Edge replay, CORS, guidance, managed assets, and STANDARD move guards
        run: |
          deno test --node-modules-dir=manual --allow-env \
            supabase/functions/_shared/cors-v2.test.ts \
            supabase/functions/_shared/prompt-security.test.ts \
            supabase/functions/_shared/rule-architect-input.test.ts \
            supabase/functions/_shared/rule-assets.test.ts \
            supabase/functions/_shared/rule-blueprint-normalizer.test.ts \
            supabase/functions/compile-chess-rule/replay-state.test.ts \
            supabase/functions/process-chess-move/protocol.test.ts \
            supabase/functions/process-chess-move/clock.test.ts \
            supabase/functions/process-chess-move/standard-engine.test.ts \
            supabase/functions/process-chess-move/integrity.test.ts \
            supabase/functions/process-chess-move/handler.test.ts

      - name: Smoke production JWT gate
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail
          endpoint='https://ucaqbhmyutlnitnedowk.supabase.co/functions/v1/compile-chess-rule'
          status="$(curl --silent --show-error --output production-edge-response.json --write-out '%{http_code}' \
            --request POST "$endpoint" \
            --header 'Content-Type: application/json' \
            --data '{"prompt":"Lorsqu’une pièce est capturée, un dragon vient l’emporter dans une animation.","premium":false,"requestKey":"11111111-1111-4111-8111-111111111111"}')"
          if [[ "$status" != '401' ]]; then
            echo "Expected production JWT rejection 401, got $status." >&2
            cat production-edge-response.json >&2 || true
            exit 1
          fi

  wire-live-coach:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'agent/platform-finalization-v1'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/platform-finalization-v1
          fetch-depth: 0

      - name: Wire live coach avatar
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('src/pages/Play.tsx')
          text = path.read_text()
          import_line = 'import LiveCoachAvatar from "@/features/coach/LiveCoachAvatar";\n'
          if import_line not in text:
              marker = 'import type { RuleJSON } from "@/engine/types";\n'
              text = text.replace(marker, marker + import_line, 1)

          latest_block = '''  const latestCoachMessage = useMemo(
    () =>
      [...coachMessages]
        .reverse()
        .find((message) => message.role === "coach")?.content ?? null,
    [coachMessages],
  );

  const openCoachPanel = useCallback(() => {
    document.getElementById("coach-panel")?.scrollIntoView({
      behavior: "smooth",
      block: "start",
    });
  }, []);

'''
          render_marker = '''  /* ------------------------------------------------------------------------ */
  /*                              Rendu de la page                             */
  /* ------------------------------------------------------------------------ */
'''
          if latest_block not in text:
              text = text.replace(render_marker, latest_block + render_marker, 1)

          text = text.replace(
              '<aside className="flex min-h-[420px] max-h-[75vh] flex-col rounded-lg border border-white/10 bg-black/25 p-4">',
              '<aside id="coach-panel" className="flex min-h-[420px] max-h-[75vh] scroll-mt-24 flex-col rounded-lg border border-white/10 bg-black/25 p-4">',
              1,
          )

          avatar_block = '''
      <LiveCoachAvatar
        enabled={coachEnabled}
        loading={coachLoading}
        message={latestCoachMessage}
        error={coachError}
        moveCount={gameState.moveHistory.length}
        onOpen={openCoachPanel}
        onEnable={() => setCoachEnabled(true)}
      />
'''
          if avatar_block not in text:
              closing = '      </section>\n    </main>\n'
              text = text.replace(closing, '      </section>\n' + avatar_block + '    </main>\n', 1)
          path.write_text(text)
          PY

      - name: Commit live coach wiring
        env:
          HUSKY: "0"
        run: |
          set -euo pipefail
          if git diff --quiet; then exit 0; fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/pages/Play.tsx
          git commit --no-verify -m 'feat: surface real-time coach avatar after every move'
          git push origin HEAD:agent/platform-finalization-v1
