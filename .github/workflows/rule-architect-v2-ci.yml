name: Rule Architect V2

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level moderate

      - name: Verify mirrored compiler and runtime invariants
        run: node scripts/verify-rule-architect-v2.mjs

      - name: Verify deployment and security invariants
        run: node scripts/verify-rule-architect-v2-ops.mjs

      - name: Test confirmed Supabase target guard
        run: node --test scripts/utils/supabase-target.test.mjs

      - name: Unit tests
        run: >-
          pnpm exec vitest run
          src/rules-v2
          src/engine/__tests__
          src/features/rule-architect
          src/features/play-hub
          src/features/multiplayer
          src/pages/Leaderboard.test.tsx
          src/pages/MultiplayerMatch.test.tsx
          src/integrations/supabase/client.test.ts
          configs/deployment/supabaseBuildFallback.test.ts

      - name: Type check
        run: |
          pnpm exec tsc --noEmit -p tsconfig.app.json
          pnpm exec tsc --noEmit -p tsconfig.node.json

      - name: Production build without remote writes
        run: pnpm build

  edge-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install npm dependencies for Deno npm imports
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Install pinned Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.9.3
          cache: true

      - name: Type-check five Edge entrypoints
        shell: bash
        run: |
          set -o pipefail
          deno check --node-modules-dir=manual \
            supabase/functions/compile-chess-rule/index.ts \
            supabase/functions/publish-rule-version/index.ts \
            supabase/functions/create-rule-lobby-v2/index.ts \
            supabase/functions/join-rule-lobby-v2/index.ts \
            supabase/functions/process-chess-move/index.ts \
            2>&1 | tee deno-check.log

      - name: Upload Deno diagnostics on failure
        if: failure() && hashFiles('deno-check.log') != ''
        uses: actions/upload-artifact@v4
        with:
          name: deno-check-diagnostics
          path: deno-check.log
          if-no-files-found: ignore
          retention-days: 3

      - name: Test Edge replay, CORS, managed assets, and STANDARD move guards
        run: |
          deno test --node-modules-dir=manual --allow-env \
            supabase/functions/_shared/cors-v2.test.ts \
            supabase/functions/_shared/prompt-security.test.ts \
            supabase/functions/_shared/rule-architect-input.test.ts \
            supabase/functions/_shared/rule-assets.test.ts \
            supabase/functions/compile-chess-rule/replay-state.test.ts \
            supabase/functions/process-chess-move/protocol.test.ts \
            supabase/functions/process-chess-move/clock.test.ts \
            supabase/functions/process-chess-move/standard-engine.test.ts \
            supabase/functions/process-chess-move/integrity.test.ts \
            supabase/functions/process-chess-move/handler.test.ts

      - name: Build a self-contained staging deployment bundle
        if: github.event_name == 'pull_request' && github.event.pull_request.number == 308
        shell: bash
        run: |
          set -o pipefail
          {
            set -euo pipefail
            mkdir -p .artifacts/compile-chess-rule
            npx --yes esbuild@0.25.0 supabase/functions/compile-chess-rule/index.ts \
              --bundle \
              --format=esm \
              --platform=neutral \
              --target=es2022 \
              '--external:npm:*' \
              --outfile=.artifacts/compile-chess-rule/index.ts
            grep -F 'Deno.serve' .artifacts/compile-chess-rule/index.ts
            grep -F 'RULE_ASSET_SEARCH_ENABLED' .artifacts/compile-chess-rule/index.ts
            grep -F 'RULE_ASSET_BUCKET_CONFIGURATION_MISMATCH' supabase/migrations/20260720214500_rule_architect_managed_assets.sql
            deno check --node-modules-dir=manual .artifacts/compile-chess-rule/index.ts
            sha256sum .artifacts/compile-chess-rule/index.ts > .artifacts/compile-chess-rule/SHA256SUMS
          } 2>&1 | tee bundle-build.log

      - name: Upload bundle diagnostics on failure
        if: failure() && hashFiles('bundle-build.log') != ''
        uses: actions/upload-artifact@v4
        with:
          name: compile-chess-rule-bundle-diagnostics
          path: bundle-build.log
          if-no-files-found: ignore
          retention-days: 3

      - name: Upload the self-contained staging deployment bundle
        if: github.event_name == 'pull_request' && github.event.pull_request.number == 308
        uses: actions/upload-artifact@v4
        with:
          name: compile-chess-rule-bundle
          path: .artifacts/compile-chess-rule
          if-no-files-found: error
          retention-days: 1
