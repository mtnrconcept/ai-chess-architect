name: Temporary Diagnose Managed Assets Staging Deploy

on:
  push:
    branches:
      - agent/rule-assets-cinematics

permissions:
  contents: write

concurrency:
  group: managed-assets-staging-diagnostic
  cancel-in-progress: false

jobs:
  diagnose:
    if: github.repository == 'mtnrconcept/ai-chess-architect'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_PROJECT_ID: hxlqmsutvhsxqydpcybj
      SUPABASE_CLI_VERSION: 2.109.1
      IMPORT_MAP: supabase/functions/import_map.json

    steps:
      - name: Checkout exact branch
        uses: actions/checkout@v4
        with:
          ref: agent/rule-assets-cinematics
          fetch-depth: 0
          persist-credentials: true

      - name: Run deployment diagnostic
        id: diagnostic
        continue-on-error: true
        shell: bash
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set +e
          npx --yes "supabase@${SUPABASE_CLI_VERSION}" --version >/tmp/cli-version.log 2>&1
          npx --offline --yes "supabase@${SUPABASE_CLI_VERSION}" functions deploy compile-chess-rule \
            --project-ref "$SUPABASE_PROJECT_ID" \
            --import-map "$IMPORT_MAP" >/tmp/deploy.log 2>&1
          code=$?
          printf '%s' "$code" >/tmp/deploy-code.txt
          exit "$code"

      - name: Commit sanitized diagnostic and remove workflow
        if: always()
        shell: bash
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          source = Path('/tmp/deploy.log').read_text(errors='replace') if Path('/tmp/deploy.log').exists() else 'deployment log missing'
          token = os.environ.get('SUPABASE_ACCESS_TOKEN', '')
          if token:
              source = source.replace(token, '[redacted-token]')
          patterns = [
              r'sbp_[A-Za-z0-9_-]+',
              r'sb_secret_[A-Za-z0-9_-]+',
              r'sb_service_role_[A-Za-z0-9_-]+',
              r'eyJ[A-Za-z0-9_.-]{24,}',
              r'Bearer\s+\S+',
              r'postgres(?:ql)?://\S+',
          ]
          for pattern in patterns:
              source = re.sub(pattern, '[redacted]', source, flags=re.I)
          lines = [line.rstrip() for line in source.splitlines() if line.strip()]
          safe = '\n'.join(lines[-30:])[:6000]
          code = Path('/tmp/deploy-code.txt').read_text().strip() if Path('/tmp/deploy-code.txt').exists() else 'missing'
          Path('docs/.managed-assets-staging-deploy-diagnostic').write_text(
              f'exit_code={code}\n--- sanitized_cli_output ---\n{safe}\n'
          )
          PY
          rm -f .github/workflows/temporary-diagnose-managed-assets-staging.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/temporary-diagnose-managed-assets-staging.yml docs/.managed-assets-staging-deploy-diagnostic
          git commit -m 'chore: capture sanitized managed asset deploy diagnostic'
          git push origin HEAD:agent/rule-assets-cinematics

      - name: Preserve failure status
        if: steps.diagnostic.outcome != 'success'
        shell: bash
        run: exit 1
