name: Temporary Platform Finalization Patcher

on:
  push:
    branches:
      - agent/platform-finalization-v1

permissions:
  contents: write

concurrency:
  group: platform-finalization-patcher
  cancel-in-progress: false

jobs:
  patch:
    if: github.repository == 'mtnrconcept/ai-chess-architect'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/platform-finalization-v1
          fetch-depth: 0

      - name: Apply deterministic patches
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              if new in text:
                  return
              if old not in text:
                  raise SystemExit(f"Missing expected fragment in {path}: {old[:80]!r}")
              file.write_text(text.replace(old, new, 1))

          def replace_all(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              if old not in text:
                  return
              file.write_text(text.replace(old, new))

          replace_once(
              'supabase/functions/compile-chess-rule/index.ts',
              'import { buildRuleArchitectSystemPrompt } from "../_shared/rule-architect-prompt.ts";\n',
              'import { buildRuleArchitectSystemPrompt } from "../_shared/rule-architect-prompt.ts";\nimport { normalizeRuleBlueprintCandidate } from "../_shared/rule-blueprint-normalizer.ts";\n',
          )
          replace_once(
              'supabase/functions/compile-chess-rule/index.ts',
              '    const result = compileRuleBlueprint(openAI.value);\n',
              '    const normalized = normalizeRuleBlueprintCandidate(openAI.value, prompt);\n    const result = compileRuleBlueprint(normalized.value);\n',
          )
          replace_once(
              'supabase/functions/compile-chess-rule/index.ts',
              '      openAIResponseId: openAI.responseId,\n',
              '      openAIResponseId: openAI.responseId,\n      normalizedFields: normalized.normalizedFields,\n',
          )
          replace_once(
              'supabase/functions/compile-chess-rule/index.ts',
              '        blueprint: result.blueprint ?? openAI.value,\n',
              '        blueprint: result.blueprint ?? normalized.value,\n',
          )

          ci = Path('.github/workflows/rule-architect-v2-ci.yml')
          ci_text = ci.read_text()
          if 'supabase/functions/generate-rule-questions/index.ts' not in ci_text:
              ci_text = ci_text.replace(
                  '            supabase/functions/compile-chess-rule/index.ts \\\n',
                  '            supabase/functions/compile-chess-rule/index.ts \\\n            supabase/functions/generate-rule-questions/index.ts \\\n',
                  1,
              )
          if 'rule-blueprint-normalizer.test.ts' not in ci_text:
              ci_text = ci_text.replace(
                  '            supabase/functions/_shared/rule-assets.test.ts \\\n',
                  '            supabase/functions/_shared/rule-assets.test.ts \\\n            supabase/functions/_shared/rule-blueprint-normalizer.test.ts \\\n',
                  1,
              )
          ci.write_text(ci_text)

          lobby = Path('src/pages/Lobby.tsx')
          lobby_text = lobby.read_text()
          if 'rule_set_hash: string | null;' not in lobby_text:
              lobby_text = lobby_text.replace(
                  '  updated_at: string | null;\n}',
                  '  updated_at: string | null;\n  rule_set_hash: string | null;\n}',
                  1,
              )
          lobby_text = lobby_text.replace(
              'id, name, creator_id, active_rules, max_players, is_active, mode, status, opponent_id, opponent_name, created_at, updated_at',
              'id, name, creator_id, active_rules, max_players, is_active, mode, status, opponent_id, opponent_name, created_at, updated_at, rule_set_hash',
          )
          helper = '''\nconst describeSupabaseError = (error: unknown, fallback: string): string => {\n  if (error instanceof Error && error.message.trim()) return error.message;\n  if (error && typeof error === "object" && "message" in error) {\n    const message = (error as { message?: unknown }).message;\n    if (typeof message === "string" && message.trim()) return message;\n  }\n  return fallback;\n};\n'''
          if 'const describeSupabaseError' not in lobby_text:
              lobby_text = lobby_text.replace(
                  'type CombinedRuleEntry = {\n',
                  helper + '\ntype CombinedRuleEntry = {\n',
                  1,
              )
          old_cancel = '''  const handleCancelLobby = async () => {\n    if (!user || !activeLobby) return;\n\n    try {\n      const { error } = await supabase\n        .from("lobbies")\n        .update({ status: "cancelled", is_active: false })\n        .eq("id", activeLobby.id)\n        .eq("creator_id", user.id);\n\n      if (error) throw error;\n\n      setActiveLobby(null);\n      toast({ title: "Partie annulée" });\n      fetchWaitingLobbies();\n    } catch (error: unknown) {\n      const description =\n        error instanceof Error\n          ? error.message\n          : "Impossible d'annuler la partie";\n      toast({\n        title: "Erreur",\n        description,\n        variant: "destructive",\n      });\n    }\n  };'''
          new_cancel = '''  const handleCancelLobby = async () => {\n    if (!user || !activeLobby) return;\n\n    try {\n      if (activeLobby.rule_set_hash) {\n        const { data, error } = await supabase.rpc("cancel_rule_lobby_v2", {\n          p_lobby_id: activeLobby.id,\n        });\n        if (error) throw error;\n        if (data !== true) throw new Error("Ce lobby ne peut plus être annulé.");\n      } else {\n        const { error } = await supabase\n          .from("lobbies")\n          .update({ status: "cancelled", is_active: false })\n          .eq("id", activeLobby.id)\n          .eq("creator_id", user.id);\n        if (error) throw error;\n      }\n\n      setActiveLobby(null);\n      setWaitingDialogOpen(false);\n      setIsQuickPlayOnline(false);\n      toast({\n        title: "Partie annulée",\n        description: "Les règles peuvent à nouveau être modifiées.",\n      });\n      await Promise.all([fetchWaitingLobbies(), fetchActiveLobby(), fetchRules()]);\n    } catch (error: unknown) {\n      toast({\n        title: "Impossible d'annuler la partie",\n        description: describeSupabaseError(\n          error,\n          "Actualisez la page puis réessayez.",\n        ),\n        variant: "destructive",\n      });\n    }\n  };'''
          if new_cancel not in lobby_text:
              if old_cancel not in lobby_text:
                  raise SystemExit('Missing Lobby handleCancelLobby block')
              lobby_text = lobby_text.replace(old_cancel, new_cancel, 1)
          old_toggle_error = '''      const description =\n        error instanceof Error\n          ? error.message\n          : "Impossible de mettre à jour la règle";'''
          new_toggle_error = '''      const description = describeSupabaseError(\n        error,\n        "Impossible de mettre à jour la règle",\n      );'''
          lobby_text = lobby_text.replace(old_toggle_error, new_toggle_error, 1)
          lobby.write_text(lobby_text)

          guided = Path('src/features/rule-architect/GuidedRuleArchitectPanel.tsx')
          guided_text = guided.read_text()
          guided_text = guided_text.replace('[Puzzle, "Puzzle du jour", "/daily-puzzle"]', '[Puzzle, "Puzzle du jour", "/play-hub"]')
          guided_text = guided_text.replace('[GraduationCap, "Coach", "/coach"]', '[GraduationCap, "Coach", "/analysis"]')
          guided.write_text(guided_text)

          tournaments = Path('src/pages/Tournaments.tsx')
          tournaments_text = tournaments.read_text()
          recovery = '''\n  useEffect(() => {\n    if (tournamentsQuery.isSuccess) {\n      setTournamentsUnavailable(false);\n    }\n  }, [tournamentsQuery.isSuccess]);\n'''
          marker = '''  useEffect(() => {\n    if (\n      tournamentsError instanceof TournamentFeatureUnavailableError ||'''
          if recovery.strip() not in tournaments_text:
              tournaments_text = tournaments_text.replace(marker, recovery + '\n' + marker, 1)
          tournaments.write_text(tournaments_text)

          Path('.github/workflows/temporary-platform-finalization-patcher.yml').unlink()
          PY

      - name: Commit patched files
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: finalize guided rules, lobbies, and tournament recovery'
          git push origin HEAD:agent/platform-finalization-v1
