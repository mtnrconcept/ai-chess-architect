name: Temporary Rule Assets WebCrypto Fix

on:
  push:
    branches:
      - agent/rule-assets-cinematics

permissions:
  contents: write

jobs:
  patch:
    if: github.repository == 'mtnrconcept/ai-chess-architect'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/rule-assets-cinematics
          fetch-depth: 0

      - name: Use an ArrayBuffer-backed digest input
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('supabase/functions/_shared/rule-assets.ts')
          source = path.read_text()
          old = '''const sha256Hex = async (bytes: Uint8Array): Promise<string> => {
            const digest = await crypto.subtle.digest("SHA-256", bytes);
            return [...new Uint8Array(digest)]
          '''
          new = '''const sha256Hex = async (bytes: Uint8Array): Promise<string> => {
            const digestInput = Uint8Array.from(bytes);
            const digest = await crypto.subtle.digest("SHA-256", digestInput.buffer);
            return [...new Uint8Array(digest)]
          '''
          if old not in source:
              raise SystemExit('Expected sha256Hex block not found')
          path.write_text(source.replace(old, new, 1))
          PY
          grep -F 'crypto.subtle.digest("SHA-256", digestInput.buffer)' supabase/functions/_shared/rule-assets.ts
          rm -f .github/workflows/temporary-fix-rule-assets-webcrypto.yml

      - name: Commit correction
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add supabase/functions/_shared/rule-assets.ts .github/workflows/temporary-fix-rule-assets-webcrypto.yml
          git commit -m 'fix: use ArrayBuffer for managed asset digest'
          git push origin HEAD:agent/rule-assets-cinematics
