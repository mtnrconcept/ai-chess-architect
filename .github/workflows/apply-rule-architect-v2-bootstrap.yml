name: Apply Rule Architect V2 bootstrap

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feat/rule-architect-v2'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/rule-architect-v2
          fetch-depth: 0

      - name: Apply prepared files
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t chunks < <(find .rule-architect-v2 -maxdepth 1 -type f -name 'chunk-*.b64' | sort)
          test "${#chunks[@]}" -eq 6
          cat "${chunks[@]}" | tr -d '\r\n' | base64 -d > /tmp/rule-architect-v2.zip
          unzip -q /tmp/rule-architect-v2.zip -d /tmp/rule-architect-v2
          drop_in="$(find /tmp/rule-architect-v2 -type d -name drop-in -print -quit)"
          test -n "$drop_in"
          cp -a "$drop_in"/. "$GITHUB_WORKSPACE"/
          rm -rf .rule-architect-v2
          rm -f .github/workflows/apply-rule-architect-v2-bootstrap.yml

      - name: Commit final files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          test -n "$(git status --porcelain)"
          git commit -m "feat: add Rule Architect V2 files"
          git push origin HEAD:feat/rule-architect-v2
