name: Temporary Refresh Lockfile

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  lockfile:
    if: github.event.pull_request.head.ref == 'agent/platform-finalization-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/platform-finalization-v1
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --lockfile-only --ignore-scripts
      - name: Commit refreshed lockfile
        env:
          HUSKY: "0"
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add pnpm-lock.yaml
          git commit --no-verify -m 'security: refresh lockfile for fast-uri 3.1.3'
          git push origin HEAD:agent/platform-finalization-v1
