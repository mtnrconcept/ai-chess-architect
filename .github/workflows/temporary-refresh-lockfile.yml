name: Temporary Refresh Lockfile

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lockfile:
    if: github.event.pull_request.head.ref == 'agent/platform-finalization-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/platform-finalization-v1
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --lockfile-only --ignore-scripts
      - uses: actions/upload-artifact@v4
        with:
          name: refreshed-pnpm-lock
          path: pnpm-lock.yaml
          retention-days: 1
          if-no-files-found: error
