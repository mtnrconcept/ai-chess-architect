name: Temporary Smoke Guided Rules Staging

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  smoke:
    if: github.event.pull_request.head.ref == 'agent/platform-finalization-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify staging JWT gates
        shell: bash
        run: |
          set -euo pipefail
          base='https://hxlqmsutvhsxqydpcybj.supabase.co/functions/v1'
          for function_name in generate-rule-questions compile-chess-rule; do
            status="$(curl --silent --show-error --output "${function_name}.json" --write-out '%{http_code}' \
              --request POST "${base}/${function_name}" \
              --header 'Content-Type: application/json' \
              --data '{"prompt":"Quand une pièce est capturée, un dragon vient l’emporter.","premium":false,"requestKey":"11111111-1111-4111-8111-111111111111"}')"
            if [[ "$status" != '401' ]]; then
              echo "Expected ${function_name} to reject anonymous request with 401, got ${status}." >&2
              cat "${function_name}.json" >&2 || true
              exit 1
            fi
          done
