name: Temporary Platform Finalization Artifact

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    if: github.event.pull_request.head.ref == 'agent/platform-finalization-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/platform-finalization-v1
      - run: python3 scripts/platform-finalization-patch.py
      - uses: actions/upload-artifact@v4
        with:
          name: platform-finalization-patched-files
          retention-days: 1
          if-no-files-found: error
          path: |
            supabase/functions/compile-chess-rule/index.ts
            .github/workflows/rule-architect-v2-ci.yml
            src/pages/Lobby.tsx
            src/pages/Tournaments.tsx
            src/features/rule-architect/GuidedRuleArchitectPanel.tsx
