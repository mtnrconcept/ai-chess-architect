name: Runtime Repair V3 Security

on:
  push:
    branches:
      - agent/runtime-repair-v3
    paths:
      - .github/workflows/runtime-repair-v3-security.yml

permissions:
  contents: write

concurrency:
  group: runtime-repair-v3-security
  cancel-in-progress: true

jobs:
  update-and-validate:
    if: github.repository == 'mtnrconcept/ai-chess-architect'
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          ref: agent/runtime-repair-v3
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Patch vulnerable transitive dependency
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          import json
          from pathlib import Path

          path = Path('package.json')
          package = json.loads(path.read_text(encoding='utf-8'))
          package.setdefault('pnpm', {}).setdefault('overrides', {})['fast-uri'] = '3.1.4'
          package.setdefault('overrides', {})['fast-uri'] = '3.1.4'
          path.write_text(json.dumps(package, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY
          pnpm install --lockfile-only

      - name: Commit dependency repair
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package.json pnpm-lock.yaml
          git commit -m 'fix(security): upgrade fast-uri to 3.1.4'
          git push origin HEAD:agent/runtime-repair-v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level moderate

      - name: Verify runtime invariants
        run: node scripts/verify-rule-architect-v2.mjs

      - name: Run unit tests
        run: pnpm test -- --run

      - name: Type check
        run: |
          pnpm exec tsc --noEmit -p tsconfig.app.json
          pnpm exec tsc --noEmit -p tsconfig.node.json

      - name: Build production bundle
        run: pnpm build
