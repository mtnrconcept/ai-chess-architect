name: Temporary Rule Assets Import Fix

on:
  push:
    branches:
      - agent/rule-assets-cinematics

permissions:
  contents: write

jobs:
  patch:
    if: github.repository == 'mtnrconcept/ai-chess-architect'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/rule-assets-cinematics
          fetch-depth: 0

      - name: Align Supabase JS version and remove temporary workflow
        shell: bash
        run: |
          set -euo pipefail
          target='supabase/functions/_shared/rule-assets.ts'
          grep -F 'npm:@supabase/supabase-js@2.57.4' "$target"
          sed -i 's#npm:@supabase/supabase-js@2\.57\.4#npm:@supabase/supabase-js@2.110.7#' "$target"
          grep -F 'npm:@supabase/supabase-js@2.110.7' "$target"
          rm -f .github/workflows/temporary-fix-rule-assets-import.yml

      - name: Commit correction
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add supabase/functions/_shared/rule-assets.ts .github/workflows/temporary-fix-rule-assets-import.yml
          git commit -m 'fix: align managed asset Supabase dependency'
          git push origin HEAD:agent/rule-assets-cinematics
